services:
  # ---------- Tailscale: this server's single tailnet node ----------
  # Owns the server's tailnet name and Tailscale SSH. All HTTP services are
  # served under this one hostname, path-routed by caddy.
  tailscale:
    image: tailscale/tailscale:v1.98.9
    container_name: tailscale
    hostname: ${TS_HOSTNAME}
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_EXTRA_ARGS: --ssh
    volumes:
      - /srv/tailscale:/var/lib/tailscale:Z
      - ./serve.json:/config/serve.json:ro

  # ---------- caddy: path router for all HTTP services ----------
  # /  -> homepage, /code/ -> code-server, /files/ -> filebrowser
  caddy:
    image: caddy:2.11.4
    container_name: caddy
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

  # ---------- homepage: service dashboard / landing page ----------
  homepage:
    image: ghcr.io/gethomepage/homepage:v1.13.2
    container_name: homepage
    restart: unless-stopped
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${TS_HOSTNAME}.${TS_TAILNET}
      HOMEPAGE_VAR_TAILNET: ${TS_TAILNET}
      HOMEPAGE_VAR_HC_API_KEY: ${HC_API_KEY}
      HOMEPAGE_VAR_HC_CHECK_UUID: ${HC_CHECK_UUID}
    volumes:
      - ./homepage:/app/config:Z
    depends_on:
      - socket-proxy

  # ---------- docker-socket-proxy: read-only container status for homepage ----------
  # Exposes only the (read-only) containers endpoint of the Docker API, so
  # homepage can show service status without holding the raw docker socket.
  socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: socket-proxy
    restart: unless-stopped
    # SELinux blocks container_t from connecting to the host docker socket;
    # run this one container unconfined (it exists to be the guarded boundary).
    security_opt:
      - label=disable
    environment:
      CONTAINERS: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
