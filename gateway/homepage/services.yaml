---
- Services:
    - Code Server:
        icon: code-server.png
        href: /code/
        description: VS Code in the browser
        server: local
        container: code-server

    - Files:
        icon: filebrowser.png
        href: /files/
        description: Web file manager for the SMB share
        server: local
        container: filebrowser

    - SMB / Time Machine:
        icon: samba.png
        description: "LAN only: smb://<server> in Finder"
        server: local
        container: samba

    - Restic Backup:
        icon: healthchecks.png
        href: https://healthchecks.io/
        description: Daily 03:30 backup to Backblaze B2
        widget:
          type: healthchecks
          url: https://healthchecks.io
          key: "{{HOMEPAGE_VAR_HC_API_KEY}}"
          uuid: "{{HOMEPAGE_VAR_HC_CHECK_UUID}}"
