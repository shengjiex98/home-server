services:
  # ---------- Tailscale sidecar: https://code.<tailnet>.ts.net ----------
  ts-code:
    image: tailscale/tailscale:v1.98.4
    container_name: ts-code
    hostname: code
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - /srv/ts-code:/var/lib/tailscale:Z
      - ./serve.json:/config/serve.json:ro

  # ---------- code-server: browser VS Code ----------
  # No published ports: only reachable through the ts-code sidecar.
  code-server:
    image: codercom/code-server:4.126.0
    container_name: code-server
    restart: unless-stopped
    environment:
      PASSWORD: ${CODE_SERVER_PASSWORD}
      XDG_DATA_HOME: /home/coder/.local/share
    user: "1000:1000"
    volumes:
      - /srv/code-server/config:/home/coder/.local/share/code-server:Z
      - /srv/code-server/projects:/home/coder/projects:Z
    working_dir: /home/coder/projects
