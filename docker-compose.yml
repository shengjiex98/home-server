services:
  # ---------- Tailscale: the secure front door ----------
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: ${TS_HOSTNAME}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_EXTRA_ARGS: --ssh
    volumes:
      - /srv/tailscale:/var/lib/tailscale:Z
      - /dev/net/tun:/dev/net/tun

  # ---------- code-server: browser VS Code ----------
  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    restart: unless-stopped
    # Localhost only. Reach it over Tailscale (see README for `tailscale serve`).
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      PASSWORD: ${CODE_SERVER_PASSWORD}
      XDG_DATA_HOME: /home/coder/.local/share
    user: "1000:1000"
    volumes:
      - /srv/code-server/config:/home/coder/.local/share/code-server:Z
      - /srv/code-server/projects:/home/coder/projects:Z
    working_dir: /home/coder/projects

  # ---------- Samba + Time Machine ----------
  samba:
    image: ghcr.io/servercontainers/samba:latest
    container_name: samba
    restart: unless-stopped
    network_mode: host          # SMB + mDNS strongly prefer host networking
    cap_add:
      - CAP_NET_ADMIN
    environment:
      AVAHI_DISABLE: "false"    # container owns mDNS; host avahi MUST be disabled
      SAMBA_CONF_LOG_LEVEL: "1"
      ACCOUNT_jerry: ${SMB_PASSWORD}
      UID_jerry: "1000"
      SAMBA_GLOBAL_STANZA: "fruit:aapl=yes;fruit:nfs_aces=no;fruit:zero_file_id=yes;min protocol=SMB2"
      SAMBA_VOLUME_CONFIG_timemachine: "[TimeMachine]; path=/shares/tm; valid users=jerry; veto files=/._*/.DS_Store/; vfs objects=catia fruit streams_xattr; fruit:time machine=yes; fruit:time machine max size=1T"
      SAMBA_VOLUME_CONFIG_files: "[Files]; path=/shares/files; valid users=jerry; read only=no"
    volumes:
      - /srv/timemachine:/shares/tm:Z
      - /srv/shares:/shares/files:Z
