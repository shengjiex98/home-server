services:
  # ---------- Samba + Time Machine (LAN only) ----------
  # One container provides both the general SMB share and the Time Machine
  # target, with built-in Avahi for macOS auto-discovery. Host networking is
  # required for SMB + mDNS; the host's own smbd/avahi are disabled by
  # scripts/bootstrap.sh so this container can own them.
  samba:
    image: ghcr.io/servercontainers/samba:a3.24.1-s4.23.8-r0
    container_name: samba
    restart: unless-stopped
    network_mode: host
    cap_add:
      - CAP_NET_ADMIN
    environment:
      # AVAHI_DISABLE is presence-based: defining it AT ALL disables avahi.
      # Leave it unset — the container owns mDNS; host avahi MUST be disabled.
      SAMBA_CONF_LOG_LEVEL: "1"
      ACCOUNT_jerry: ${SMB_PASSWORD}
      UID_jerry: "1000"
      SAMBA_GLOBAL_STANZA: "fruit:aapl=yes;fruit:nfs_aces=no;fruit:zero_file_id=yes;min protocol=SMB2"
      SAMBA_VOLUME_CONFIG_timemachine: "[TimeMachine]; path=/shares/tm; read only=no; valid users=jerry; veto files=/._*/.DS_Store/; vfs objects=catia fruit streams_xattr; fruit:time machine=yes; fruit:time machine max size=1T"
      SAMBA_VOLUME_CONFIG_files: "[Files]; path=/shares/files; valid users=jerry; read only=no"
    volumes:
      - /srv/timemachine:/shares/tm:Z
      # :z (shared), not :Z — filebrowser mounts this same dir; a private label
      # would be stolen by whichever container was recreated last.
      - /srv/shares:/shares/files:z
