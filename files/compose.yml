services:
  # ---------- FileBrowser: web UI over the same data as the SMB share ----------
  # Reachable via caddy at /files/ on this server's tailnet hostname. Auth is
  # delegated to Tailscale (only tailnet devices can reach it), so FileBrowser
  # runs with --noauth. Runs as uid 1000 to match /srv/shares ownership.
  filebrowser:
    image: filebrowser/filebrowser:v2.63.18
    container_name: filebrowser
    restart: unless-stopped
    user: "1000:1000"
    command: --noauth --baseurl /files
    volumes:
      # :z (shared) — samba mounts this same dir; see samba/compose.yml
      - /srv/shares:/srv:z
      - /srv/filebrowser/database:/database:Z
      - /srv/filebrowser/config:/config:Z
